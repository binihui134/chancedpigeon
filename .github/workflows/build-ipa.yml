name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Check signing secrets
        id: check_signing
        run: |
          if [[ -n "${P12_BASE64}" && -n "${P12_PASSWORD}" && -n "${PROVISIONING_PROFILE_BASE64}" && -n "${APPLE_TEAM_ID}" && -n "${PROVISIONING_PROFILE_SPECIFIER}" ]]; then
            echo "signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "signing=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}

      - name: Import signing certificate
        if: ${{ steps.check_signing.outputs.signing == 'true' }}
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Import provisioning profile
        if: ${{ steps.check_signing.outputs.signing == 'true' }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/${PROVISIONING_PROFILE_SPECIFIER}.mobileprovision"
        shell: bash
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}

      - name: Build archive
        if: ${{ steps.check_signing.outputs.signing == 'true' }}
        run: |
          xcodebuild -project GamePigeonClone.xcodeproj -scheme GamePigeonClone -configuration Release -destination "generic/platform=iOS" -archivePath build/GamePigeonClone.xcarchive clean archive DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Development"

      - name: Export IPA
        if: ${{ steps.check_signing.outputs.signing == 'true' }}
        run: |
          xcodebuild -exportArchive -archivePath build/GamePigeonClone.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build/ipa

      - name: Upload IPA artifact
        if: ${{ steps.check_signing.outputs.signing == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: GamePigeonClone.ipa
          path: build/ipa/GamePigeonClone.ipa

      - name: Skip IPA build due to missing signing assets
        if: ${{ steps.check_signing.outputs.signing == 'false' }}
        run: |
          echo "Skipping IPA build because required signing secrets are missing."
          echo "Add APPLE_TEAM_ID, P12_BASE64, P12_PASSWORD, PROVISIONING_PROFILE_BASE64, and PROVISIONING_PROFILE_SPECIFIER to run a signed build."
